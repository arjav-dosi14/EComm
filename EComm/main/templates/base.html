{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %} ShopSphere {% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "background": "#f8fafc",
                    "surface-bright": "#f8fafc",
                    "tertiary": "#475569",
                    "on-surface": "#0f172a",
                    "on-primary-fixed": "#0f172a",
                    "primary": "#0f172a",
                    "inverse-primary": "#cbd5e1",
                    "on-secondary-fixed": "#1e293b",
                    "outline": "#94a3b8",
                    "surface-container-lowest": "#ffffff",
                    "tertiary-container": "#64748b",
                    "on-primary-fixed-variant": "#1e293b",
                    "inverse-surface": "#0f172a",
                    "secondary-fixed": "#e2e8f0",
                    "inverse-on-surface": "#f8fafc",
                    "surface-container-low": "#f1f5f9",
                    "surface-container-high": "#e2e8f0",
                    "on-primary-container": "#f1f5f9",
                    "tertiary-fixed": "#f1f5f9",
                    "surface-container-highest": "#cbd5e1",
                    "primary-container": "#1e293b",
                    "surface-dim": "#cbd5e1",
                    "on-error": "#ffffff",
                    "on-secondary": "#ffffff",
                    "on-tertiary-fixed": "#0f172a",
                    "on-tertiary": "#ffffff",
                    "on-secondary-container": "#475569",
                    "surface-tint": "#0f172a",
                    "on-error-container": "#ef4444",
                    "surface": "#ffffff",
                    "primary-fixed-dim": "#94a3b8",
                    "on-tertiary-fixed-variant": "#334155",
                    "surface-variant": "#f1f5f9",
                    "tertiary-fixed-dim": "#cbd5e1",
                    "secondary": "#475569",
                    "on-tertiary-container": "#e2e8f0",
                    "on-background": "#0f172a",
                    "surface-container": "#f1f5f9",
                    "error-container": "#fee2e2",
                    "on-secondary-fixed-variant": "#475569",
                    "on-surface-variant": "#475569",
                    "secondary-container": "#f1f5f9",
                    "secondary-fixed-dim": "#cbd5e1",
                    "outline-variant": "#e2e8f0",
                    "on-primary": "#ffffff",
                    "error": "#ef4444",
                    "primary-fixed": "#f1f5f9"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "xs": "8px",
                    "gutter": "24px",
                    "lg": "40px",
                    "md": "24px",
                    "margin-mobile": "16px",
                    "container-max": "1280px",
                    "base": "4px",
                    "sm": "16px",
                    "xl": "64px",
                    "xxl": "96px"
            },
            "fontFamily": {
                    "headline-sm": ["Inter"],
                    "body-sm": ["Inter"],
                    "body-lg": ["Inter"],
                    "body-md": ["Inter"],
                    "display-lg": ["Inter"],
                    "label-sm": ["Inter"],
                    "display-lg-mobile": ["Inter"],
                    "label-md": ["Inter"],
                    "headline-md": ["Inter"]
            },
            "fontSize": {
                    "headline-sm": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                    "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-sm": ["12px", {"lineHeight": "1", "fontWeight": "500"}],
                    "display-lg-mobile": ["36px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-md": ["14px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "headline-md": ["30px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            scroll-behavior: smooth;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .product-card:hover .product-actions {
            opacity: 1;
            transform: translateY(0);
        }
        .product-actions {
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }
        .mesh-gradient {
            background: linear-gradient(180deg, #f8fafc 0%, #ffffff 100%);
        }
    </style>
    {% block extra_css %}
    {% endblock %}
</head>
<body>
{% include 'partials/navbar.html' %}
{% block content %}
{% endblock %}
{% include 'partials/footer.html' %}
{% block extra_js %}
{% endblock %}
</body>
</html>
