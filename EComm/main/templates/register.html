{% load static %}
<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register</title>
<!-- Load Tailwind CSS v3 for base utilities and layout -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Configure Inter font as requested -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<style data-purpose="global-styles">
    /* Applying global typography and background based on Design System */
    body {
      font-family: 'Inter', sans-serif;
      /* Soft violet gradient background as seen in Screenshot */
      background: linear-gradient(135deg, #e0e7ff 0%, #ede9fe 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      color: #1f2937;
    }
  </style>
<style data-purpose="card-layout">
    /* Glassmorphism card effect and layout */
    .container {
      background-color: #ffffff;
      padding: 3rem 2.5rem;
      border-radius: 1rem;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      width: 100%;
      max-width: 440px;
    }

    h1 {
      font-size: 1.875rem;
      font-weight: 700;
      color: #111827;
      text-align: center;
      margin-bottom: 2rem;
    }
  </style>
<style data-purpose="form-elements">
    /* Styling form inputs and buttons based on Screen_2 */
    .input-group {
      margin-bottom: 1.25rem;
    }

    .input-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.5rem;
    }

    .input-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      transition: all 0.2s;
      outline: none;
    }

    .input-group input:focus {
      border-color: #4338ca;
      box-shadow: 0 0 0 3px rgba(67, 56, 202, 0.1);
    }

    /* Deep Indigo Button style */
    button[type="submit"] {
      width: 100%;
      background-color: #1e1b4b; /* Deep indigo from design system screenshot */
      color: #ffffff;
      padding: 0.75rem;
      border-radius: 0.5rem;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      transition: background-color 0.2s;
      margin-top: 1rem;
    }

    button[type="submit"]:hover {
      background-color: #312e81;
    }
  </style>
<style data-purpose="footer-links">
    /* Styling for the login link section */
    .login-link {
      text-align: center;
      font-size: 0.875rem;
      color: #4b5563;
      margin-top: 1.5rem;
    }

    .login-link a {
      color: #1e1b4b;
      font-weight: 600;
      text-decoration: none;
    }

    .login-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
<!-- BEGIN: RegistrationCard -->
<div class="container" data-purpose="registration-card">
<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 1.5rem;">
    <img src="{% static 'favicon.png' %}" alt="ShopSphere Logo" style="height: 6rem; width: auto; margin-bottom: 0.5rem;" />
    <span style="font-family: 'Poppins', 'Montserrat', sans-serif; font-size: 1.875rem; font-weight: 800; color: #4338ca; letter-spacing: -0.025em; line-height: 1;">ShopSphere</span>
</div>
<h1>Create Account</h1>
<form method="POST">
        {% csrf_token %}

        <!-- BEGIN: UsernameField -->
<div class="input-group">
<label>Username</label>
<input name="username" placeholder="Enter Username" type="text"/>
</div>
<!-- END: UsernameField -->
<!-- BEGIN: EmailField -->
<div class="input-group">
<label>Email</label>
<input name="email" placeholder="Enter Email" type="email"/>
</div>
<!-- END: EmailField -->
<!-- BEGIN: PasswordFields -->
<div class="input-group">
<label>Password</label>
<input name="password" placeholder="Enter Password" type="password"/>
</div>
<div class="input-group">
<label>Confirm Password</label>
<input name="confirm_password" placeholder="Confirm Password" type="password"/>
</div>
<!-- END: PasswordFields -->
<button type="submit">Register</button>
<!-- BEGIN: NavigationLink -->
<div class="login-link">
            Already have an account?
            <a href="{% url 'login' %}">Login</a>
</div>
<!-- END: NavigationLink -->
</form>
<!-- BEGIN: ErrorMessage -->
    {% if error %}
        <p style="color:#dc2626; text-align:center; margin-top:20px; font-size: 0.875rem; font-weight: 500;">
            {{ error }}
        </p>
    {% endif %}
    <!-- END: ErrorMessage -->
</div>
<!-- END: RegistrationCard -->
</body></html>
